<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Municipality District Tree</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }

.leaflet-control-layers {
  max-height: 85vh;
  overflow: auto;
  font-size: 13px;
}

.count-label {
  background: transparent;
  border: none;
}

.count-text {
  font-size: 16px;
  font-weight: bold;
  color: #111;
  text-shadow:
    1px 1px 0 #fff,
   -1px -1px 0 #fff,
    1px -1px 0 #fff,
   -1px 1px 0 #fff,
    0 0 4px #fff;
  white-space: nowrap;
  text-align: center;
}

.leaflet-tooltip.custom-tooltip {
  background: rgba(255,255,255,0.96);
  border: 1px solid #333;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  color: #111;
  padding: 6px 8px;
  font-size: 13px;
  line-height: 1.5;
}

.info.legend {
  background: rgba(255,255,255,0.96);
  padding: 10px 12px;
  border: 1px solid #333;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  font-size: 12px;
  line-height: 18px;
  color: #111;
  max-width: 280px;
}

.legend-row {
  display: flex;
  align-items: center;
  margin-bottom: 4px;
}

.legend-color {
  width: 14px;
  height: 14px;
  border: 1px solid #000;
  margin-right: 8px;
  flex: 0 0 14px;
}
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.js"></script>

<script>
const map = L.map("map");
const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: "&copy; OpenStreetMap contributors" }
).addTo(map);

// default municipality colors only used when count not available
const municipalityColors = {
  "Dammam": "#2563eb",
  "Dhahran": "#16a34a",
  "Khobar": "#dc2626"
};

// -----------------------------
// RISK LOGIC
// -----------------------------
function getRiskLevel(count) {
  count = Number(count || 0);

  if (count <= 0) {
    return {
      level: "No Data",
      color: "#9ca3af",
      range: "0"
    };
  }

  if (count <= 100) {
    if (count >= 80) return { level: "High Risk", color: "#dc2626", range: "80 - 100" };
    if (count >= 40) return { level: "Medium Risk", color: "#facc15", range: "40 - 79" };
    return { level: "Low Risk", color: "#16a34a", range: "1 - 39" };
  }

  if (count <= 1000) {
    if (count >= 800) return { level: "High Risk", color: "#dc2626", range: "800 - 1000" };
    if (count >= 400) return { level: "Medium Risk", color: "#facc15", range: "400 - 799" };
    return { level: "Low Risk", color: "#16a34a", range: "100 - 399" };
  }

  if (count <= 10000) {
    if (count >= 8000) return { level: "High Risk", color: "#dc2626", range: "8000 - 10000" };
    if (count >= 4000) return { level: "Medium Risk", color: "#facc15", range: "4000 - 7999" };
    return { level: "Low Risk", color: "#16a34a", range: "1000 - 3999" };
  }

  if (count <= 100000) {
    if (count >= 80000) return { level: "High Risk", color: "#dc2626", range: "80000 - 100000" };
    if (count >= 40000) return { level: "Medium Risk", color: "#facc15", range: "40000 - 79999" };
    return { level: "Low Risk", color: "#16a34a", range: "10000 - 39999" };
  }

  if (count <= 1000000) {
    if (count >= 800000) return { level: "High Risk", color: "#dc2626", range: "800000 - 1000000" };
    if (count >= 400000) return { level: "Medium Risk", color: "#facc15", range: "400000 - 799999" };
    return { level: "Low Risk", color: "#16a34a", range: "100000 - 399999" };
  }

  return {
    level: "Very High Risk",
    color: "#7f1d1d",
    range: "> 1000000"
  };
}

function getDistrictCount(districtName) {
  return Number(districtCounts[districtName]?.count || 0);
}

function getDistrictFillColor(districtName, city) {
  const count = getDistrictCount(districtName);
  if (count > 0) {
    return getRiskLevel(count).color;
  }
  return municipalityColors[city];
}

// -----------------------------
// BASE STYLES
// -----------------------------
function boundaryStyle(city) {
  return {
    color: "black",
    fillColor: municipalityColors[city],
    weight: 3,
    fillOpacity: 0.08
  };
}

function districtStyle(city, districtName = "") {
  return {
    color: "#000000",
    weight: 2,
    opacity: 1,
    fillColor: getDistrictFillColor(districtName, city),
    fillOpacity: 0.60
  };
}

// -----------------------------
// DATA STORES
// -----------------------------
const districtCounts = {};
const districtToCity = {};
const districtLayers = {};
const municipalityBoundaryLayers = {};
const municipalityCenters = {};
const municipalityTotals = {};

const districtMarkers = {};
const municipalityMarkers = {};

// -----------------------------
// MARKERS
// -----------------------------
function createTextMarker(lat, long, text) {
  return L.marker([lat, long], {
    icon: L.divIcon({
      className: "count-label",
      html: `<div class="count-text">${text}</div>`,
      iconSize: [50, 20],
      iconAnchor: [25, 10]
    })
  });
}

function clearAllCountMarkers() {
  Object.values(districtMarkers).forEach(m => {
    if (map.hasLayer(m)) map.removeLayer(m);
  });
  Object.values(municipalityMarkers).forEach(m => {
    if (map.hasLayer(m)) map.removeLayer(m);
  });
}

// -----------------------------
// LEGEND
// -----------------------------
const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  const div = L.DomUtil.create("div", "info legend");

  div.innerHTML = `
    <div style="font-weight:bold; margin-bottom:8px;">Risk Legend</div>

    <div style="margin-bottom:6px;"><b>1 - 100</b></div>
    <div class="legend-row"><span class="legend-color" style="background:#dc2626;"></span>High Risk (80 - 100)</div>
    <div class="legend-row"><span class="legend-color" style="background:#facc15;"></span>Medium Risk (40 - 79)</div>
    <div class="legend-row"><span class="legend-color" style="background:#16a34a;"></span>Low Risk (1 - 39)</div>

    <hr style="margin:8px 0;">

    <div style="margin-bottom:6px;"><b>100 - 1000</b></div>
    <div class="legend-row"><span class="legend-color" style="background:#dc2626;"></span>High Risk (800 - 1000)</div>
    <div class="legend-row"><span class="legend-color" style="background:#facc15;"></span>Medium Risk (400 - 799)</div>
    <div class="legend-row"><span class="legend-color" style="background:#16a34a;"></span>Low Risk (100 - 399)</div>

    <hr style="margin:8px 0;">

    <div style="margin-bottom:6px;"><b>1000 - 10000</b></div>
    <div class="legend-row"><span class="legend-color" style="background:#dc2626;"></span>High Risk (8000 - 10000)</div>
    <div class="legend-row"><span class="legend-color" style="background:#facc15;"></span>Medium Risk (4000 - 7999)</div>
    <div class="legend-row"><span class="legend-color" style="background:#16a34a;"></span>Low Risk (1000 - 3999)</div>

    <hr style="margin:8px 0;">

    <div style="margin-bottom:6px;"><b>10000 - 100000</b></div>
    <div class="legend-row"><span class="legend-color" style="background:#dc2626;"></span>High Risk (80000 - 100000)</div>
    <div class="legend-row"><span class="legend-color" style="background:#facc15;"></span>Medium Risk (40000 - 79999)</div>
    <div class="legend-row"><span class="legend-color" style="background:#16a34a;"></span>Low Risk (10000 - 39999)</div>

    <hr style="margin:8px 0;">

    <div style="margin-bottom:6px;"><b>100000 - 1000000</b></div>
    <div class="legend-row"><span class="legend-color" style="background:#dc2626;"></span>High Risk (800000 - 1000000)</div>
    <div class="legend-row"><span class="legend-color" style="background:#facc15;"></span>Medium Risk (400000 - 799999)</div>
    <div class="legend-row"><span class="legend-color" style="background:#16a34a;"></span>Low Risk (100000 - 399999)</div>
  `;

  return div;
};

legend.addTo(map);

// -----------------------------
// REFRESH COUNTS + TOOLTIPS
// -----------------------------
function refreshCounts() {
  clearAllCountMarkers();

  const selectedDistrictsByCity = {
    "Dammam": [],
    "Dhahran": [],
    "Khobar": []
  };

  Object.keys(districtLayers).forEach(name => {
    if (map.hasLayer(districtLayers[name])) {
      const city = districtToCity[name];
      if (selectedDistrictsByCity[city]) {
        selectedDistrictsByCity[city].push(name);
      }
    }
  });

  Object.keys(selectedDistrictsByCity).forEach(city => {
    const selected = selectedDistrictsByCity[city];

    if (selected.length > 0) {
      selected.forEach(name => {
        const d = districtCounts[name];
        if (!d) return;

        if (!districtMarkers[name]) {
          districtMarkers[name] = createTextMarker(d.lat, d.long, d.count);
        } else {
          districtMarkers[name].setLatLng([d.lat, d.long]);
          districtMarkers[name].setIcon(L.divIcon({
            className: "count-label",
            html: `<div class="count-text">${d.count}</div>`,
            iconSize: [50, 20],
            iconAnchor: [25, 10]
          }));
        }

        districtMarkers[name].addTo(map);

        const risk = getRiskLevel(d.count);

        if (districtLayers[name]) {
          districtLayers[name].setTooltipContent(`
            <div>
              <b>District:</b> ${name}<br>
              <b>Municipality:</b> ${districtToCity[name] || ""}<br>
              <b>Count:</b> ${d.count}<br>
              <b>Risk:</b> ${risk.level}
            </div>
          `);

          districtLayers[name].setStyle(
            districtStyle(districtToCity[name], name)
          );
        }
      });
    } else {
      const boundary = municipalityBoundaryLayers[city];
      const total = municipalityTotals[city] || 0;
      const center = municipalityCenters[city];

      if (boundary) {
        boundary.setTooltipContent(`
          <div>
            <b>Municipality:</b> ${city}<br>
            <b>Count:</b> ${total}
          </div>
        `);
      }

      if (boundary && center && map.hasLayer(boundary) && total > 0) {
        if (!municipalityMarkers[city]) {
          municipalityMarkers[city] = createTextMarker(center.lat, center.long, total);
        } else {
          municipalityMarkers[city].setLatLng([center.lat, center.long]);
          municipalityMarkers[city].setIcon(L.divIcon({
            className: "count-label",
            html: `<div class="count-text">${total}</div>`,
            iconSize: [50, 20],
            iconAnchor: [25, 10]
          }));
        }
        municipalityMarkers[city].addTo(map);
      }
    }
  });
}

// -----------------------------
// LOAD GEOJSON
// -----------------------------
Promise.all([
  fetch("./municipality.geojson").then(r => r.json()),
  fetch("./dammam.geojson").then(r => r.json()),
  fetch("./dhahran.geojson").then(r => r.json()),
  fetch("./khobar.geojson").then(r => r.json())
]).then(([municipalityData, dammamData, dhahranData, khobarData]) => {

  municipalityData.features.forEach(f => {
    const name = (f.properties.REMARKS || "").trim();
    let city = null;

    if (name === "الدمام") city = "Dammam";
    if (name === "الظهران") city = "Dhahran";
    if (name === "الخبر") city = "Khobar";
    if (!city) return;

    const boundary = L.geoJSON(f, {
      style: boundaryStyle(city)
    });

    boundary.bindTooltip(
      `<div>
        <b>Municipality:</b> ${city}<br>
        <b>Count:</b> 0
      </div>`,
      {
        sticky: true,
        direction: "top",
        opacity: 0.95,
        className: "custom-tooltip"
      }
    );

    boundary.on("mouseover", function () {
      const total = municipalityTotals[city] || 0;
      boundary.setTooltipContent(`
        <div>
          <b>Municipality:</b> ${city}<br>
          <b>Count:</b> ${total}
        </div>
      `);
    });

    municipalityBoundaryLayers[city] = boundary;

    const bounds = boundary.getBounds();
    const center = bounds.getCenter();
    municipalityCenters[city] = { lat: center.lat, long: center.lng };

    boundary.on("add remove", () => setTimeout(refreshCounts, 30));
  });

  function makeDistrictNodes(data, city) {
    return data.features.map(f => {
      const districtName = (f.properties.REMARKS || "").trim();

      const layer = L.geoJSON(f, {
        style: districtStyle(city, districtName)
      });

      function getDistrictTooltipHtml() {
        const count = getDistrictCount(districtName);
        const risk = getRiskLevel(count);

        return `
          <div>
            <b>District:</b> ${districtName}<br>
            <b>Municipality:</b> ${city}<br>
            <b>Count:</b> ${count}<br>
            <b>Risk:</b> ${risk.level}
          </div>
        `;
      }

      layer.bindTooltip(getDistrictTooltipHtml(), {
        sticky: true,
        direction: "top",
        opacity: 0.95,
        className: "custom-tooltip"
      });

      layer.on({
        mouseover: function (e) {
          e.target.setStyle({
            color: "#000000",
            weight: 3,
            opacity: 1,
            fillColor: getDistrictFillColor(districtName, city),
            fillOpacity: 0.85
          });
          layer.setTooltipContent(getDistrictTooltipHtml());
        },
        mouseout: function (e) {
          e.target.setStyle(districtStyle(city, districtName));
        },
        click: function () {
          const d = districtCounts[districtName];
          if (d) {
            window.parent.postMessage({
              type: "mapClick",
              state: districtName,
              lat: d.lat,
              long: d.long
            }, "*");
          } else {
            window.parent.postMessage({
              type: "mapClick",
              state: districtName,
              lat: null,
              long: null
            }, "*");
          }
        }
      });

      districtLayers[districtName] = layer;
      districtToCity[districtName] = city;

      layer.on("add remove", () => setTimeout(refreshCounts, 30));

      return {
        label: districtName,
        layer: layer
      };
    });
  }

  const dammamDistricts = makeDistrictNodes(dammamData, "Dammam");
  const dhahranDistricts = makeDistrictNodes(dhahranData, "Dhahran");
  const khobarDistricts = makeDistrictNodes(khobarData, "Khobar");

  const overlaysTree = {
    label: "Municipality",
    children: [
      {
        label: "Dammam",
        selectAllCheckbox: true,
        children: [
          { label: "Boundary", layer: municipalityBoundaryLayers["Dammam"] },
          {
            label: "Districts",
            selectAllCheckbox: true,
            children: dammamDistricts
          }
        ]
      },
      {
        label: "Dhahran",
        selectAllCheckbox: true,
        children: [
          { label: "Boundary", layer: municipalityBoundaryLayers["Dhahran"] },
          {
            label: "Districts",
            selectAllCheckbox: true,
            children: dhahranDistricts
          }
        ]
      },
      {
        label: "Khobar",
        selectAllCheckbox: true,
        children: [
          { label: "Boundary", layer: municipalityBoundaryLayers["Khobar"] },
          {
            label: "Districts",
            selectAllCheckbox: true,
            children: khobarDistricts
          }
        ]
      }
    ]
  };

  L.control.layers.tree(
    { "OpenStreetMap": osm },
    overlaysTree,
    {
      collapsed: false,
      namedToggle: true,
      selectorBack: false
    }
  ).addTo(map);

  const allLayers = [
    municipalityBoundaryLayers["Dammam"],
    municipalityBoundaryLayers["Dhahran"],
    municipalityBoundaryLayers["Khobar"],
    ...dammamDistricts.map(x => x.layer),
    ...dhahranDistricts.map(x => x.layer),
    ...khobarDistricts.map(x => x.layer)
  ].filter(Boolean);

  map.fitBounds(L.featureGroup(allLayers).getBounds());

  window.parent.postMessage({ type: "iframeReady" }, "*");
});

// -----------------------------
// RECEIVE GRAFANA DATA
// -----------------------------
window.addEventListener("message", (event) => {
  if (event.data?.type !== "incidentData") return;

  Object.keys(districtCounts).forEach(k => delete districtCounts[k]);
  municipalityTotals["Dammam"] = 0;
  municipalityTotals["Dhahran"] = 0;
  municipalityTotals["Khobar"] = 0;

  (event.data.data || []).forEach(row => {
    const name = row.state;
    const count = Number(row.count || 0);
    const lat = Number(row.lat);
    const long = Number(row.long);

    if (!name || isNaN(count) || isNaN(lat) || isNaN(long)) return;

    districtCounts[name] = { count, lat, long };

    const city = districtToCity[name];
    if (city) {
      municipalityTotals[city] = (municipalityTotals[city] || 0) + count;
    }
  });

  Object.keys(districtLayers).forEach(name => {
    const city = districtToCity[name];
    if (districtLayers[name]) {
      districtLayers[name].setStyle(districtStyle(city, name));
    }
  });

  refreshCounts();
});
</script>
</body>
</html>
