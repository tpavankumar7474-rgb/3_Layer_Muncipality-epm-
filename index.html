<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Municipality District Tree</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.css"/>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { width:100%; height:100vh; }

.leaflet-control-layers {
  max-height: 85vh;
  overflow: auto;
  font-size: 13px;
}

.count-label {
  background: transparent;
  border: none;
}

.count-text {
  font-size: 16px;
  font-weight: bold;
  color: #111;
  text-shadow:
    1px 1px 0 #fff,
   -1px -1px 0 #fff,
    1px -1px 0 #fff,
   -1px 1px 0 #fff,
    0 0 4px #fff;
  white-space: nowrap;
  text-align: center;
}

.leaflet-tooltip.custom-tooltip {
  background: rgba(255,255,255,0.96);
  border: 1px solid #333;
  border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  color: #111;
  padding: 6px 8px;
  font-size: 13px;
  line-height: 1.5;
}

/* simple legend at bottom center */
.simple-legend {
  position: fixed !important;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.96);
  padding: 8px 14px;
  border: 1px solid #333;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  font-size: 13px;
  color: #111;
  z-index: 9999;
  min-width: 320px;
  text-align: center;
}

.legend-title {
  font-weight: bold;
  margin-bottom: 6px;
}

.legend-items {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-color {
  width: 14px;
  height: 14px;
  border: 1px solid #000;
  display: inline-block;
}
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.control.layers.tree@1.1.0/L.Control.Layers.Tree.js"></script>

<script>
const map = L.map("map");
const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: "&copy; OpenStreetMap contributors" }
).addTo(map);

// Municipality colors only for boundary/base appearance
const municipalityColors = {
  "Dammam": "#2563eb",
  "Dhahran": "#16a34a",
  "Khobar": "#dc2626"
};

// -----------------------------
// DATA STORES
// -----------------------------
const districtCounts = {};               // { districtName: { count, lat, long } }
const districtToCity = {};               // district -> municipality
const districtLayers = {};               // district polygon layers
const municipalityBoundaryLayers = {};   // municipality boundary layers
const municipalityCenters = {};          // municipality center for total label
const municipalityTotals = {             // municipality total counts
  "Dammam": 0,
  "Dhahran": 0,
  "Khobar": 0
};

const districtMarkers = {};
const municipalityMarkers = {};

// -----------------------------
// RISK LOGIC
// -----------------------------
function getRiskLevel(count) {
  count = Number(count || 0);

  if (count <= 0) {
    return {
      level: "No Data",
      color: "#2563eb"   // BLUE
    };
  }

  if (count <= 100) {
    if (count >= 80) return { level: "High Risk", color: "#dc2626" };   // RED
    if (count >= 40) return { level: "Medium Risk", color: "#facc15" }; // YELLOW
    return { level: "Low Risk", color: "#16a34a" };                     // GREEN
  }

  if (count <= 1000) {
    if (count >= 800) return { level: "High Risk", color: "#dc2626" };
    if (count >= 400) return { level: "Medium Risk", color: "#facc15" };
    return { level: "Low Risk", color: "#16a34a" };
  }

  if (count <= 10000) {
    if (count >= 8000) return { level: "High Risk", color: "#dc2626" };
    if (count >= 4000) return { level: "Medium Risk", color: "#facc15" };
    return { level: "Low Risk", color: "#16a34a" };
  }

  if (count <= 100000) {
    if (count >= 80000) return { level: "High Risk", color: "#dc2626" };
    if (count >= 40000) return { level: "Medium Risk", color: "#facc15" };
    return { level: "Low Risk", color: "#16a34a" };
  }

  if (count <= 1000000) {
    if (count >= 800000) return { level: "High Risk", color: "#dc2626" };
    if (count >= 400000) return { level: "Medium Risk", color: "#facc15" };
    return { level: "Low Risk", color: "#16a34a" };
  }

  return {
    level: "High Risk",
    color: "#dc2626"
  };
}

function getDistrictCount(districtName) {
  return Number(districtCounts[districtName]?.count || 0);
}

function getDistrictFillColor(districtName) {
  const count = getDistrictCount(districtName);
  return getRiskLevel(count).color;
}

// -----------------------------
// STYLES
// -----------------------------
function boundaryStyle(city) {
  return {
    color: "#000000",
    fillColor: municipalityColors[city],
    weight: 3,
    fillOpacity: 0.12
  };
}

function districtStyle(city, districtName = "") {
  return {
    color: "#000000",
    weight: 2,
    opacity: 1,
    fillColor: getDistrictFillColor(districtName),
    fillOpacity: 0.65
  };
}

// -----------------------------
// MARKERS
// -----------------------------
function createTextMarker(lat, long, text) {
  return L.marker([lat, long], {
    icon: L.divIcon({
      className: "count-label",
      html: `<div class="count-text">${text}</div>`,
      iconSize: [50, 20],
      iconAnchor: [25, 10]
    })
  });
}

function clearAllCountMarkers() {
  Object.values(districtMarkers).forEach(m => {
    if (map.hasLayer(m)) map.removeLayer(m);
  });
  Object.values(municipalityMarkers).forEach(m => {
    if (map.hasLayer(m)) map.removeLayer(m);
  });
}

// -----------------------------
// SIMPLE LEGEND
// -----------------------------
const legend = L.control({ position: "bottomleft" });

legend.onAdd = function () {
  const div = L.DomUtil.create("div", "info legend simple-legend");
  div.innerHTML = `
    <div class="legend-title">Risk Legend</div>
    <div class="legend-items">
      <div class="legend-item">
        <span class="legend-color" style="background:#dc2626;"></span>
        <span>High Risk</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="background:#facc15;"></span>
        <span>Medium Risk</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="background:#16a34a;"></span>
        <span>Low Risk</span>
      </div>
      <div class="legend-item">
        <span class="legend-color" style="background:#2563eb;"></span>
        <span>No Data</span>
      </div>
    </div>
  `;
  return div;
};

legend.addTo(map);

// -----------------------------
// REFRESH COUNTS / COLORS
// -----------------------------
function refreshCounts() {
  clearAllCountMarkers();

  const selectedDistrictsByCity = {
    "Dammam": [],
    "Dhahran": [],
    "Khobar": []
  };

  Object.keys(districtLayers).forEach(name => {
    if (map.hasLayer(districtLayers[name])) {
      const city = districtToCity[name];
      if (selectedDistrictsByCity[city]) {
        selectedDistrictsByCity[city].push(name);
      }
    }
  });

  Object.keys(selectedDistrictsByCity).forEach(city => {
    const selected = selectedDistrictsByCity[city];

    // If districts selected for this municipality -> show district counts
    if (selected.length > 0) {
      selected.forEach(name => {
        const d = districtCounts[name];
        const count = Number(d?.count || 0);
        const risk = getRiskLevel(count);

        if (d && !isNaN(d.lat) && !isNaN(d.long)) {
          if (!districtMarkers[name]) {
            districtMarkers[name] = createTextMarker(d.lat, d.long, count);
          } else {
            districtMarkers[name].setLatLng([d.lat, d.long]);
            districtMarkers[name].setIcon(L.divIcon({
              className: "count-label",
              html: `<div class="count-text">${count}</div>`,
              iconSize: [50, 20],
              iconAnchor: [25, 10]
            }));
          }
          districtMarkers[name].addTo(map);
        }

        if (districtLayers[name]) {
          districtLayers[name].setStyle(districtStyle(city, name));
          districtLayers[name].setTooltipContent(`
            <div>
              <b>District:</b> ${name}<br>
              <b>Municipality:</b> ${city}<br>
              <b>Count:</b> ${count}<br>
              <b>Risk:</b> ${risk.level}
            </div>
          `);
        }
      });
    } else {
      // If no districts selected, but municipality boundary selected -> show municipality total
      const boundary = municipalityBoundaryLayers[city];
      const total = municipalityTotals[city] || 0;
      const center = municipalityCenters[city];

      if (boundary) {
        boundary.setTooltipContent(`
          <div>
            <b>Municipality:</b> ${city}<br>
            <b>Total Count:</b> ${total}
          </div>
        `);
      }

      if (boundary && center && map.hasLayer(boundary)) {
        if (!municipalityMarkers[city]) {
          municipalityMarkers[city] = createTextMarker(center.lat, center.long, total);
        } else {
          municipalityMarkers[city].setLatLng([center.lat, center.long]);
          municipalityMarkers[city].setIcon(L.divIcon({
            className: "count-label",
            html: `<div class="count-text">${total}</div>`,
            iconSize: [60, 20],
            iconAnchor: [30, 10]
          }));
        }
        municipalityMarkers[city].addTo(map);
      }
    }
  });
}

// -----------------------------
// LOAD GEOJSON FILES
// -----------------------------
Promise.all([
  fetch("./municipality.geojson").then(r => r.json()),
  fetch("./dammam.geojson").then(r => r.json()),
  fetch("./dhahran.geojson").then(r => r.json()),
  fetch("./khobar.geojson").then(r => r.json())
]).then(([municipalityData, dammamData, dhahranData, khobarData]) => {

  // Municipality boundaries
  municipalityData.features.forEach(f => {
    const name = (f.properties.REMARKS || "").trim();
    let city = null;

    if (name === "الدمام") city = "Dammam";
    if (name === "الظهران") city = "Dhahran";
    if (name === "الخبر") city = "Khobar";
    if (!city) return;

    const boundary = L.geoJSON(f, {
      style: boundaryStyle(city)
    });

    boundary.bindTooltip(
      `<div>
        <b>Municipality:</b> ${city}<br>
        <b>Total Count:</b> 0
      </div>`,
      {
        sticky: true,
        direction: "top",
        opacity: 0.95,
        className: "custom-tooltip"
      }
    );

    boundary.on("mouseover", function () {
      const total = municipalityTotals[city] || 0;
      boundary.setTooltipContent(`
        <div>
          <b>Municipality:</b> ${city}<br>
          <b>Total Count:</b> ${total}
        </div>
      `);
    });

    municipalityBoundaryLayers[city] = boundary;

    const bounds = boundary.getBounds();
    const center = bounds.getCenter();
    municipalityCenters[city] = { lat: center.lat, long: center.lng };

    boundary.on("add remove", () => setTimeout(refreshCounts, 30));
  });

  // District layers
  function makeDistrictNodes(data, city) {
    return data.features.map(f => {
      const districtName = (f.properties.REMARKS || "").trim();

      const layer = L.geoJSON(f, {
        style: districtStyle(city, districtName)
      });

      function getDistrictTooltipHtml() {
        const count = getDistrictCount(districtName);
        const risk = getRiskLevel(count);

        return `
          <div>
            <b>District:</b> ${districtName}<br>
            <b>Municipality:</b> ${city}<br>
            <b>Count:</b> ${count}<br>
            <b>Risk:</b> ${risk.level}
          </div>
        `;
      }

      layer.bindTooltip(getDistrictTooltipHtml(), {
        sticky: true,
        direction: "top",
        opacity: 0.95,
        className: "custom-tooltip"
      });

      layer.on({
        mouseover: function (e) {
          e.target.setStyle({
            color: "#000000",
            weight: 3,
            opacity: 1,
            fillColor: getDistrictFillColor(districtName),
            fillOpacity: 0.85
          });
          layer.setTooltipContent(getDistrictTooltipHtml());
        },
        mouseout: function (e) {
          e.target.setStyle(districtStyle(city, districtName));
        },
        click: function () {
          const d = districtCounts[districtName];
          if (d) {
            window.parent.postMessage({
              type: "mapClick",
              state: districtName,
              lat: d.lat,
              long: d.long
            }, "*");
          } else {
            window.parent.postMessage({
              type: "mapClick",
              state: districtName,
              lat: null,
              long: null
            }, "*");
          }
        }
      });

      districtLayers[districtName] = layer;
      districtToCity[districtName] = city;

      layer.on("add remove", () => setTimeout(refreshCounts, 30));

      return {
        label: districtName,
        layer: layer
      };
    });
  }

  const dammamDistricts = makeDistrictNodes(dammamData, "Dammam");
  const dhahranDistricts = makeDistrictNodes(dhahranData, "Dhahran");
  const khobarDistricts = makeDistrictNodes(khobarData, "Khobar");

  // Tree control
  const overlaysTree = {
    label: "Municipality",
    children: [
      {
        label: "Dammam",
        selectAllCheckbox: true,
        children: [
          { label: "Boundary", layer: municipalityBoundaryLayers["Dammam"] },
          {
            label: "Districts",
            selectAllCheckbox: true,
            children: dammamDistricts
          }
        ]
      },
      {
        label: "Dhahran",
        selectAllCheckbox: true,
        children: [
          { label: "Boundary", layer: municipalityBoundaryLayers["Dhahran"] },
          {
            label: "Districts",
            selectAllCheckbox: true,
            children: dhahranDistricts
          }
        ]
      },
      {
        label: "Khobar",
        selectAllCheckbox: true,
        children: [
          { label: "Boundary", layer: municipalityBoundaryLayers["Khobar"] },
          {
            label: "Districts",
            selectAllCheckbox: true,
            children: khobarDistricts
          }
        ]
      }
    ]
  };

  L.control.layers.tree(
    { "OpenStreetMap": osm },
    overlaysTree,
    {
      collapsed: false,
      namedToggle: true,
      selectorBack: false
    }
  ).addTo(map);

  const allLayers = [
    municipalityBoundaryLayers["Dammam"],
    municipalityBoundaryLayers["Dhahran"],
    municipalityBoundaryLayers["Khobar"],
    ...dammamDistricts.map(x => x.layer),
    ...dhahranDistricts.map(x => x.layer),
    ...khobarDistricts.map(x => x.layer)
  ].filter(Boolean);

  map.fitBounds(L.featureGroup(allLayers).getBounds());

  window.parent.postMessage({ type: "iframeReady" }, "*");
});

// -----------------------------
// RECEIVE DATA FROM GRAFANA
// -----------------------------
window.addEventListener("message", (event) => {
  if (event.data?.type !== "incidentData") return;

  // Reset data
  Object.keys(districtCounts).forEach(k => delete districtCounts[k]);
  municipalityTotals["Dammam"] = 0;
  municipalityTotals["Dhahran"] = 0;
  municipalityTotals["Khobar"] = 0;

  // Fill district counts
  (event.data.data || []).forEach(row => {
    const name = row.state;
    const count = Number(row.count || 0);
    const lat = Number(row.lat);
    const long = Number(row.long);

    if (!name || isNaN(count)) return;

    districtCounts[name] = {
      count: count,
      lat: isNaN(lat) ? null : lat,
      long: isNaN(long) ? null : long
    };

    const city = districtToCity[name];
    if (city) {
      municipalityTotals[city] = (municipalityTotals[city] || 0) + count;
    }
  });

  // Refresh district colors after new data
  Object.keys(districtLayers).forEach(name => {
    const city = districtToCity[name];
    if (districtLayers[name]) {
      districtLayers[name].setStyle(districtStyle(city, name));
    }
  });

  refreshCounts();
});
</script>
</body>
</html>
